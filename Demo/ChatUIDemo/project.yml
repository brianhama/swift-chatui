name: ChatUIDemo
options:
  deploymentTarget:
    iOS: "17.0"
packages:
  ChatUI:
    path: ../..
targets:
  ChatUIDemo:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ChatUIDemoApp.swift
      - path: DemoStore
      - path: Screens
      - path: Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ChatUIDemo.app
        PRODUCT_NAME: ChatUIDemo
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        SWIFT_VERSION: 6.0
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: ChatUI
  ChatUIDemoTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: ChatUIDemo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ChatUIDemoTests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: 6.0
schemes:
  ChatUIDemo:
    build:
      targets:
        ChatUIDemo: all
        ChatUIDemoTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      coverageTargets:
        - local: ChatUIDemo
      targets:
        - local: ChatUIDemoTests
    archive:
      config: Release
  ChatUIDemoTests:
    build:
      targets:
        ChatUIDemoTests: all
    test:
      config: Debug
      gatherCoverageData: true
      coverageTargets:
        - local: ChatUIDemo
      targets:
        - local: ChatUIDemoTests
